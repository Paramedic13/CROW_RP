      <main class="section">
        <div class="container">
          <div class="section-heading">
            <div class="eyebrow">§ Кодекс</div>
            <h1 class="page-title">ЛОР · ИСТОРИЯ</h1>
            <div class="title-rule"></div>
            <p class="lead">
              Каждая земля хранит шрамы. Каждая банда — легенду. Открой карточку и узнай,
              на чьей крови построен этот мир.
            </p>
          </div>

          <div class="lore-grid">
            <div>
              <button class="lore-card" type="button" data-lore-entry data-type="Локация" data-name="Ван Хорн" data-tagline="Порт, где тонут не только корабли">
                <span class="lore-type">Локация</span>
                <h2 class="card-title">Ван Хорн</h2>
                <p>Порт, где тонут не только корабли.</p>
                <span class="card-link">Раскрыть →</span>
              </button>
              <template>
                <p>Ван Хорн пахнет рыбой, порохом и предательством. Здесь причаливают те, кто бежит — от закона, от долгов, от собственного отражения в бутылке.</p>
                <p>Местные не задают вопросов. И не отвечают. В переулках за салуном чаще находят тела, чем монеты. Если ты пришёл сюда — значит, тебе уже нечего терять.</p>
                <p>Шериф? Был. Один. Его шляпу до сих пор иногда выносит прибоем.</p>
              </template>
            </div>

            <div>
              <button class="lore-card" type="button" data-lore-entry data-type="Фракция" data-name="Законники" data-tagline="Звезда на груди — мишень на спине">
                <span class="lore-type">Фракция</span>
                <h2 class="card-title">Законники</h2>
                <p>Звезда на груди — мишень на спине.</p>
                <span class="card-link">Раскрыть →</span>
              </button>
              <template>
                <p>Они носят значки и верят, что закон — это что-то большее, чем бумажка, которую можно сжечь. Может, и так. Но пули значки не различают.</p>
                <p>Маршалы, шерифы, помощники — все они пишут одну историю: историю людей, которые встают между порядком и хаосом, зная, что хаос всегда стреляет первым.</p>
                <p>Уважение или ненависть — выбирай. Безразличия они не терпят.</p>
              </template>
            </div>

            <div>
              <button class="lore-card" type="button" data-lore-entry data-type="Фракция" data-name="Контрабандисты" data-tagline="Тени с тяжёлыми карманами">
                <span class="lore-type">Фракция</span>
                <h2 class="card-title">Контрабандисты</h2>
                <p>Тени с тяжёлыми карманами.</p>
                <span class="card-link">Раскрыть →</span>
              </button>
              <template>
                <p>Они не герои. Они не злодеи. Они — река, по которой течёт всё то, что закон называет грехом: виски, опиум, оружие, чужие тайны.</p>
                <p>Их пути идут через болота Лемойна и тропы Большой Долины. Найти их сложно. Договориться — ещё сложнее. Предать — невозможно дважды.</p>
                <p>Если тебе предложили работу — кивни. Если отказался — забудь дорогу обратно.</p>
              </template>
            </div>

            <div>
              <button class="lore-card" type="button" data-lore-entry data-type="Локация" data-name="Сен-Дени" data-tagline="Город, носящий маску цивилизации">
                <span class="lore-type">Локация</span>
                <h2 class="card-title">Сен-Дени</h2>
                <p>Город, носящий маску цивилизации.</p>
                <span class="card-link">Раскрыть →</span>
              </button>
              <template>
                <p>Газовые фонари, трамваи, оперный театр. И крысы — двуногие и хвостатые — в равном изобилии.</p>
                <p>Здесь джентльмен в цилиндре может перерезать тебе горло за карточный долг, а проститутка в переулке может оказаться твоим лучшим другом до утра.</p>
                <p>Запах денег и канализации смешивается в один аромат — аромат прогресса.</p>
              </template>
            </div>

            <div>
              <button class="lore-card" type="button" data-lore-entry data-type="Фракция" data-name="Племя Вапити" data-tagline="Земля помнит. Они — тоже">
                <span class="lore-type">Фракция</span>
                <h2 class="card-title">Племя Вапити</h2>
                <p>Земля помнит. Они — тоже.</p>
                <span class="card-link">Раскрыть →</span>
              </button>
              <template>
                <p>Их вытеснили в горы. Их детей забрали. Их духов высмеяли. Но они всё ещё здесь — молчаливые, как сосны, и острые, как обсидиановый нож.</p>
                <p>Они не воюют за территорию. Они воюют за память. И эту войну им проиграть нельзя — иначе исчезнут и они сами.</p>
                <p>Если встретил их у костра — сядь и слушай. Это редкое приглашение.</p>
              </template>
            </div>

            <div>
              <button class="lore-card" type="button" data-lore-entry data-type="Локация" data-name="Блэкуотер" data-tagline="Граница между вчера и завтра">
                <span class="lore-type">Локация</span>
                <h2 class="card-title">Блэкуотер</h2>
                <p>Граница между вчера и завтра.</p>
                <span class="card-link">Раскрыть →</span>
              </button>
              <template>
                <p>Автомобили рядом с конями. Телеграф рядом с томагавком. Блэкуотер — это место, где старый мир спорит с новым, и оба проигрывают.</p>
                <p>Банки здесь толстые, охрана злая, а агенты Пинкертона никогда не спят. Идеальное место, чтобы стать богатым. Или мёртвым.</p>
                <p>Чаще — второе.</p>
              </template>
            </div>
